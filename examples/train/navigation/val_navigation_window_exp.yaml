envs:
  - name: RemoteEnv
    n_envs: 30               # validation subset
    data_source: navigation
    seed: [0, 60, 2]         # every other task = 30 unique scenes
    max_turns: 10
    response_length_per_turn: 1024
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 3
      eval_set: long_horizon
      prompt_format: eval_mode     # <think> optional at eval time
      max_actions_per_step: 5
