envs:
  - name: RemoteEnv
    n_envs: 10           # Small for quick validation
    data_source: navigation
    seed: [30, 40, 1]    # 10 unique validation scenes
    max_turns: 5
    response_length_per_turn: 512
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 3
      eval_set: base
      prompt_format: eval_mode
      max_actions_per_step: 5
