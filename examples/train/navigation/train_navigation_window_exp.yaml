envs:
  - name: RemoteEnv
    n_envs: 60               # covers all 60 long_horizon tasks; fits single-GPU batch_size=30
    data_source: navigation
    seed: [0, 60]            # 60 long_horizon tasks
    max_turns: 10            # up to 10 LLM calls per episode
    response_length_per_turn: 1024
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 3
      eval_set: long_horizon
      prompt_format: free_think    # <think>...</think><action>...</action>
      max_actions_per_step: 5      # agent can batch up to 5 primitive actions per turn
