defaults:
  - ../../../vagen/configs/eval_default

fileroot: ${oc.env:HOME}/projects/vagen

envs:
  - name: ShellGameTouch
    n_envs: 64
    tag_id: shell_game_touch_test
    seed: [0, 64, 1]
    max_turns: 2
    response_length_per_turn: 512
    config:
      env_id: ShellGameTouch-v0
      obs_mode: state
      format_reward: 0.02
      success_reward: 1.0

experiment:
  dump_dir: ${fileroot}/rollouts/eval_shell_game_touch
  default_max_turns: 2

run:
  backend: "sglang"
  base_seed: 0
  max_concurrent_jobs: 32
  resume: skip_completed
  live_summary: true

backends:
  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: ""
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0

  openai:
    api_key: ""
    base_url: null
    model: "gpt-4.1-mini"
    max_concurrency: 8
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
