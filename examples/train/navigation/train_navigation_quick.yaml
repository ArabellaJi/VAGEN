envs:
  - name: RemoteEnv
    n_envs: 4            # Small for quick validation (full experiment: 10000)
    data_source: navigation
    seed: [0, 30]        # 30 unique scenes
    max_turns: 5         # Reduced from 10 for speed
    response_length_per_turn: 512
    config:
      base_urls: "http://localhost:8000"
      timeout: 1800
      retries: 2
      eval_set: base
      prompt_format: free_think
      max_actions_per_step: 5
