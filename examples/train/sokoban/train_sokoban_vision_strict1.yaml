envs:
  - name: Sokoban # registered env name
    n_envs: 10000
    data_source: sokoban # nickname for logging
    seed: [1,10000,1] # sample n_env seeds from seed[0] to seed[1] with each seed repeat at most seed[2] times
    max_turns: 8 # single-action control run: keep enough turns for 3-8 step maps
    response_length_per_turn: 512 # max response length per turn
    config: # env-specific config
      render_mode: vision
      max_actions_per_step: 1
      min_solution_steps: [3,8]
      format_reward: 0.0
      require_informative_wm: true
